name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build
        env:
          ADMIN_PASSWORD: ci-test-password

  deploy-info:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Deployment target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "Branch main → deploy de produção na Vercel"
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "Branch staging → deploy de preview na Vercel"
          fi
